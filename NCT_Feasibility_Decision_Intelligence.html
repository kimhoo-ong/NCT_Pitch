<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCT Feasibility Decision Intelligence</title>
<style>
:root {
  --paper: #f7f3ea;
  --paper-2: #efe8da;
  --ink: #20201d;
  --muted: #62615b;
  --faint: #8b887d;
  --line: rgba(32, 32, 29, 0.12);
  --line-strong: rgba(32, 32, 29, 0.22);
  --gold: #a9823a;
  --gold-soft: rgba(169, 130, 58, 0.14);
  --blue: #456f8f;
  --blue-soft: rgba(69, 111, 143, 0.13);
  --green: #6d8f63;
  --green-soft: rgba(109, 143, 99, 0.18);
  --red: #b45a52;
  --red-soft: rgba(180, 90, 82, 0.12);
  --shadow: 0 18px 42px rgba(74, 60, 38, 0.10), 0 2px 8px rgba(0, 0, 0, 0.03);
  --serif: Georgia, "Times New Roman", serif;
  --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.7), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(169,130,58,0.08), transparent 35%),
    radial-gradient(circle at 10% 90%, rgba(69,111,143,0.06), transparent 40%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.045;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
}

.deck {
  position: relative;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: 46px 64px 42px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 320ms ease;
}

.slide.active {
  opacity: 1;
  pointer-events: auto;
}

.chrome {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 22px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--faint);
  text-transform: uppercase;
}

.chrome b {
  color: var(--gold);
  font-weight: 500;
}

.slide-head {
  margin-top: 28px;
  max-width: 1080px;
}

.kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--gold);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.kicker::before {
  content: "";
  width: 28px;
  height: 1px;
  background: var(--gold);
}

h1,
h2 {
  margin: 0;
  font-family: var(--serif);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 0.98;
}

h1 { font-size: clamp(56px, 6vw, 86px); }
h2 { font-size: clamp(38px, 4vw, 58px); }

em {
  color: var(--gold);
  font-style: italic;
}

.subtitle {
  margin: 14px 0 0;
  max-width: 780px;
  color: var(--muted);
  font-size: 20px;
  line-height: 1.45;
  font-weight: 300;
}

.content {
  flex: 1;
  min-height: 0;
  margin-top: 26px;
}

.footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  color: var(--faint);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.17em;
  text-transform: uppercase;
}

.panel {
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.48);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.quiet-panel {
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.32);
  border-radius: 8px;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1.02fr 0.98fr;
  gap: 36px;
  align-items: center;
  height: 100%;
}

.hero-statement {
  border-left: 3px solid var(--gold);
  padding-left: 22px;
  margin-top: 26px;
  color: var(--muted);
  font-size: 21px;
  line-height: 1.45;
  max-width: 680px;
}

.platform-hero {
  position: relative;
  min-height: 420px;
  padding: 26px;
  display: grid;
  align-content: center;
  gap: 18px;
}

.platform-row {
  display: grid;
  grid-template-columns: 1fr 70px 1.15fr;
  gap: 14px;
  align-items: center;
}

.file-stack {
  position: relative;
  height: 116px;
}

.file {
  position: absolute;
  width: 165px;
  height: 76px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: rgba(255,255,255,0.9);
  padding: 12px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.05);
}

.file:nth-child(1) { left: 4px; top: 26px; transform: rotate(-5deg); }
.file:nth-child(2) { left: 30px; top: 13px; transform: rotate(3deg); }
.file:nth-child(3) { left: 62px; top: 38px; transform: rotate(-1deg); }

.file-title {
  font-family: var(--serif);
  font-size: 18px;
  margin-bottom: 6px;
}

.file-meta {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--faint);
  letter-spacing: 0.12em;
}

.arrow {
  color: var(--gold);
  font-size: 44px;
  text-align: center;
  font-family: var(--serif);
}

.decision-card {
  padding: 20px;
  border-radius: 8px;
  background: linear-gradient(150deg, rgba(169,130,58,0.12), rgba(255,255,255,0.8));
  border: 1px solid var(--gold-soft);
}

.decision-card .label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.decision-card .value {
  font-family: var(--serif);
  font-size: 34px;
  line-height: 1;
}

.three-proof {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.proof-card {
  padding: 18px;
  min-height: 130px;
}

.proof-card strong {
  display: block;
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 8px;
}

.proof-card span {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.42;
}

.messy-workflow {
  display: grid;
  grid-template-columns: 1.05fr 0.2fr 0.95fr 0.2fr 0.9fr;
  gap: 16px;
  align-items: stretch;
  height: 100%;
}

.messy-zone {
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.zone-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}

.team-files {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.mini-xls {
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.8);
  border-radius: 6px;
  padding: 10px;
  min-height: 70px;
}

.mini-xls .team {
  font-family: var(--serif);
  font-size: 16px;
}

.mini-xls .version {
  margin-top: 6px;
  color: var(--faint);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
}

.manual-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
  justify-content: center;
}

.manual-step {
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  padding: 14px;
  background: rgba(255,255,255,0.45);
}

.manual-step b {
  display: block;
  font-size: 15px;
  margin-bottom: 6px;
}

.manual-step span {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.35;
}

.report-delay {
  display: grid;
  align-content: center;
  gap: 14px;
}

.delay-number {
  font-family: var(--serif);
  font-size: 74px;
  line-height: 0.9;
  color: var(--red);
}

.management-questions {
  display: grid;
  gap: 11px;
}

.management-question {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.62);
  padding: 13px 14px;
}

.management-question span {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 7px;
}

.management-question b {
  display: block;
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;
  line-height: 1.12;
}

.control-line {
  border-left: 3px solid var(--gold);
  background: var(--gold-soft);
  padding: 13px 15px;
  color: var(--ink);
  font-size: 16px;
  line-height: 1.36;
}

.merged-risk {
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  gap: 16px;
  height: 100%;
}

.risk-panels {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 16px;
  min-height: 0;
}

.merged-card {
  padding: 18px 20px;
  min-height: 0;
}

.merged-list {
  display: grid;
  gap: 8px;
}

.merged-risk .risk-row {
  padding: 8px 0;
}

.merged-risk .risk-copy b {
  font-size: 17px;
}

.merged-risk .risk-copy span {
  font-size: 13px;
}

.review-list {
  gap: 8px;
}

.review-list .management-question {
  padding: 10px 12px;
}

.review-list .management-question span {
  margin-bottom: 5px;
}

.review-list .management-question b {
  font-size: 18px;
}

.margin-highlight {
  display: grid;
  grid-template-columns: 250px 1fr;
  align-items: center;
  gap: 22px;
  padding: 18px 22px;
  border-left: 3px solid var(--red);
}

.margin-highlight .big {
  font-family: var(--serif);
  font-size: 48px;
  color: var(--red);
  line-height: 1;
}

.margin-highlight p {
  color: var(--muted);
  font-size: 17px;
  line-height: 1.4;
  margin: 0;
}

.margin-highlight p strong {
  color: var(--ink);
  font-weight: 600;
}

.margin-highlight .cause-tags {
  margin-top: 12px;
}

.excel-reality {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 18px;
  height: 100%;
}

.reality-card {
  padding: 22px 24px;
}

.reality-list {
  display: grid;
  gap: 12px;
}

.reality-list .risk-row {
  padding: 12px 0;
}

.reality-list .risk-copy b {
  font-size: 20px;
}

.reality-list .risk-copy span {
  font-size: 14px;
}

.scale-card {
  padding: 24px;
  display: grid;
  align-content: center;
}

.scale-card h3 {
  margin: 0 0 12px;
  font-family: var(--serif);
  font-size: 31px;
  font-weight: 400;
  line-height: 1.05;
}

.growth-equation {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px 0 14px;
}

.growth-equation span {
  border: 1px solid rgba(180,90,82,0.18);
  border-radius: 999px;
  background: rgba(180,90,82,0.07);
  color: var(--red);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 7px 9px;
}

.scale-flow {
  display: grid;
  gap: 8px;
  margin: 12px 0;
}

.scale-step {
  display: grid;
  grid-template-columns: 42px 1fr;
  gap: 12px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.48);
  padding: 10px 12px;
}

.scale-step b {
  display: grid;
  place-items: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--red-soft);
  color: var(--red);
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
}

.scale-step span {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.28;
}

.reality-takeaway {
  border-left: 3px solid var(--gold);
  background: var(--gold-soft);
  border-radius: 8px;
  padding: 13px 16px;
  color: var(--ink);
  font-size: 16px;
  line-height: 1.38;
}

.risk-table {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  height: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.42);
}

.risk-col {
  padding: 22px 24px;
}

.risk-col:first-child {
  border-right: 1px solid var(--line);
}

.risk-head {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}

.risk-row {
  display: grid;
  grid-template-columns: 26px 1fr;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  align-items: start;
}

.risk-row:last-child { border-bottom: none; }

.risk-num {
  color: var(--gold);
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
}

.risk-copy b {
  display: block;
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  margin-bottom: 4px;
}

.risk-copy span {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.38;
}

.movement-card {
  padding: 24px;
  align-self: center;
  border-left: 3px solid var(--red);
}

.movement-card .big {
  font-family: var(--serif);
  font-size: 56px;
  color: var(--red);
  line-height: 1;
  margin-bottom: 12px;
}

.movement-card p {
  color: var(--muted);
  font-size: 18px;
  line-height: 1.45;
  margin: 0;
}

.movement-card p strong {
  color: var(--ink);
  font-weight: 600;
}

.cause-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 18px;
}

.cause-tags span {
  border: 1px solid rgba(183,74,64,0.22);
  border-radius: 999px;
  background: rgba(183,74,64,0.06);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  padding: 7px 10px;
  text-transform: uppercase;
}

.before-after {
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  gap: 16px;
  height: 100%;
}

.transformation-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.95fr) 156px minmax(0, 1.08fr);
  gap: 18px;
  min-height: 0;
}

.state-card {
  min-height: 0;
  padding: 24px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.state-card h3 {
  font-family: var(--serif);
  font-size: 29px;
  margin: 0 0 18px;
  font-weight: 400;
  line-height: 1.08;
}

.state-card.today {
  border-color: rgba(180,90,82,0.26);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.52), rgba(180,90,82,0.09)),
    rgba(255,255,255,0.32);
  box-shadow: 0 14px 34px rgba(111,64,56,0.08);
}

.state-card.future {
  border-color: rgba(109,143,99,0.28);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.62), rgba(109,143,99,0.14)),
    rgba(255,255,255,0.44);
  box-shadow: 0 22px 48px rgba(65,88,56,0.12);
}

.state-card::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 5px;
}

.state-card.today::before {
  background: linear-gradient(90deg, var(--red), rgba(180,90,82,0.2));
}

.state-card.future::before {
  background: linear-gradient(90deg, var(--green), var(--gold));
}

.state-tag {
  width: fit-content;
  margin-bottom: 12px;
  border-radius: 999px;
  padding: 7px 10px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.state-card.today .state-tag {
  color: var(--red);
  background: var(--red-soft);
}

.state-card.future .state-tag {
  color: var(--green);
  background: var(--green-soft);
}

.state-list {
  display: grid;
  gap: 11px;
}

.state-list div {
  display: grid;
  grid-template-columns: 30px 1fr;
  gap: 12px;
  color: var(--ink);
  font-size: 16px;
  line-height: 1.36;
  align-items: start;
  padding: 12px 0;
  border-top: 1px solid var(--line);
}

.state-list i {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  margin-top: 1px;
  display: grid;
  place-items: center;
  font-style: normal;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1;
}

.state-card.today .state-list i {
  background: rgba(180,90,82,0.13);
  color: var(--red);
}

.state-card.future .state-list i {
  background: rgba(109,143,99,0.18);
  color: var(--green);
}

.shift-column {
  display: grid;
  grid-template-rows: 1fr auto 1fr;
  align-items: center;
  justify-items: center;
  min-height: 0;
}

.shift-line {
  width: 1px;
  height: 100%;
  background: linear-gradient(180deg, transparent, rgba(169,130,58,0.45), transparent);
}

.shift-card {
  width: 100%;
  padding: 16px 14px;
  text-align: center;
  border: 1px solid rgba(169,130,58,0.26);
  background: rgba(255,255,255,0.58);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.shift-card b {
  display: block;
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 400;
  line-height: 1.12;
  margin-bottom: 10px;
}

.shift-card span {
  display: inline-grid;
  place-items: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--gold-soft);
  color: var(--gold);
  font-size: 24px;
}

.value-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  padding: 14px 18px;
  border-color: rgba(169,130,58,0.2);
  background: rgba(255,255,255,0.42);
}

.value-strip div {
  color: var(--ink);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  text-align: center;
  border-right: 1px solid var(--line);
}

.value-strip div:last-child {
  border-right: 0;
}

.process-flow {
  height: 100%;
  display: grid;
  align-items: center;
  gap: 20px;
}

.phase-bands {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  align-items: stretch;
}

.phase-band {
  border: 1px solid rgba(69,111,143,0.18);
  background: rgba(69,111,143,0.08);
  border-radius: 8px;
  padding: 11px 14px;
  min-height: 70px;
}

.phase-band.decision {
  border-color: rgba(169,130,58,0.24);
  background: rgba(169,130,58,0.10);
}

.phase-band.visibility {
  border-color: rgba(109,143,99,0.22);
  background: rgba(109,143,99,0.12);
}

.phase-band span {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 6px;
}

.phase-band.visibility span {
  color: var(--green);
}

.phase-band.decision span {
  color: var(--gold);
}

.phase-band b {
  display: block;
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 400;
  line-height: 1.08;
}

.flow-track {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  position: relative;
}

.flow-track::before {
  content: "";
  position: absolute;
  left: 7%;
  right: 7%;
  top: 31px;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--gold));
  z-index: 0;
}

.flow-step {
  position: relative;
  z-index: 1;
  text-align: center;
  min-width: 0;
}

.flow-dot {
  width: 62px;
  height: 62px;
  margin: 0 auto 12px;
  border-radius: 50%;
  border: 1px solid var(--blue);
  background: var(--paper);
  display: grid;
  place-items: center;
  font-family: var(--serif);
  color: var(--blue);
  font-size: 22px;
  box-shadow: 0 0 0 8px var(--paper);
}

.flow-step.decision .flow-dot {
  border-color: var(--gold);
  color: var(--gold);
}

.flow-step.visibility .flow-dot {
  border-color: var(--green);
  color: var(--green);
}

.flow-card {
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.42);
  border-radius: 8px;
  padding: 14px 12px 15px;

}

.flow-step.decision .flow-card {
  border-color: rgba(169,130,58,0.22);
  background: rgba(169,130,58,0.08);
}

.flow-step.visibility .flow-card {
  border-color: rgba(109,143,99,0.22);
  background: rgba(109,143,99,0.08);
}

.flow-title {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.1;
  margin-bottom: 8px;
}

.flow-what {
  color: var(--ink);
  font-size: 13px;
  line-height: 1.25;
  margin-bottom: 8px;
  font-weight: 600;
}

.flow-why {
  color: var(--muted);
  font-size: 12.5px;
  line-height: 1.32;
}

.journey-slide {
  height: 100%;

  grid-template-rows: auto minmax(0, 1fr);
  gap: 12px;
}

.phase1-stack {
  grid-template-rows: auto auto minmax(0, 1fr);
}

.mini-flow {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 14px;
  align-items: center;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.38);
}

.mini-flow-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--faint);
  white-space: nowrap;
}

.mini-flow-steps {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}

.mini-step {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255,255,255,0.32);
  color: var(--faint);
  padding: 7px 8px;
  min-width: 0;
}

.mini-step b {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  margin-bottom: 4px;
}

.mini-step span {
  display: block;
  font-size: 12px;
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mini-step.active.control {
  border-color: rgba(69,111,143,0.34);
  background: rgba(69,111,143,0.11);
  color: var(--blue);
}

.mini-step.active.visibility {
  border-color: rgba(109,143,99,0.36);
  background: rgba(109,143,99,0.13);
  color: var(--green);
}

.mini-step.active.decision {
  border-color: rgba(169,130,58,0.34);
  background: rgba(169,130,58,0.13);
  color: var(--gold);
}

.control-foundation {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.foundation-step {
  padding: 12px 14px;
  border: 1px solid rgba(69,111,143,0.18);
  border-radius: 8px;
  background: rgba(69,111,143,0.07);
}

.foundation-step b {
  display: block;
  font-family: var(--serif);
  font-weight: 400;
  font-size: 18px;
  margin-bottom: 4px;
}

.foundation-step strong {
  display: block;
  font-size: 13px;
  margin-bottom: 4px;
}

.foundation-step span {
  display: block;
  color: var(--muted);
  font-size: 12.5px;
  line-height: 1.32;
}

.journey-note {
  display: grid;
  grid-template-columns: 0.8fr 1.2fr;
  gap: 14px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.38);
}

.journey-note b {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
}

.journey-note span {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.35;
}

.drill-path {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.drill-path span {
  color: var(--ink);
  background: rgba(255,255,255,0.52);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 8px;
}

.excel-layout {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 18px;
  height: 100%;
}

.excel-template,
.input-control,
.fabric-entry,
.fabric-core,
.fabric-benefits {
  padding: 20px;
}

.sheet-frame {
  margin-top: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.7);
}

.sheet-toolbar {
  display: grid;
  grid-template-columns: 92px 1fr 74px;
  gap: 8px;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid var(--line);
  background: rgba(69,111,143,0.08);
}

.sheet-pill {
  border-radius: 999px;
  background: rgba(255,255,255,0.72);
  border: 1px solid var(--line);
  padding: 7px 9px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.template-section {
  display: grid;
  grid-template-columns: 170px 1fr 1fr;
  gap: 1px;
  border-bottom: 1px solid var(--line);
}

.template-section:last-child {
  border-bottom: 0;
}

.template-section div {
  padding: 12px 13px;
  min-height: 46px;
  background: rgba(255,255,255,0.58);
  color: var(--muted);
  font-size: 13px;
}

.template-section .section-name {
  background: rgba(69,111,143,0.10);
  color: var(--blue);
  font-family: var(--serif);
  font-size: 17px;
}

.template-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  border-bottom: 1px solid var(--line);
}

.meta-cell {
  background: rgba(255,255,255,0.58);
  padding: 10px 12px;
  min-height: 54px;
}

.meta-cell b {
  display: block;
  color: var(--faint);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.meta-cell span {
  display: block;
  color: var(--ink);
  font-size: 14px;
}

.feasi-input-table {
  margin-top: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.66);
}

.feasi-row {
  display: grid;
  grid-template-columns: 1.45fr 82px 130px;
  gap: 1px;
  border-bottom: 1px solid var(--line);
}

.feasi-row:last-child {
  border-bottom: 0;
}

.feasi-row div {
  padding: 9px 11px;
  background: rgba(255,255,255,0.56);
  color: var(--muted);
  font-size: 12.5px;
  line-height: 1.2;
}

.feasi-row.header div {
  background: rgba(69,111,143,0.10);
  color: var(--blue);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.feasi-row.section div {
  background: rgba(32,32,29,0.05);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 16px;
}

.feasi-row.aggregate div {
  background: rgba(32,32,29,0.04);
  color: var(--faint);
}

.feasi-row.input div {
  background: rgba(255,255,255,0.62);
}

.feasi-row .amount-input {
  color: var(--ink);
  background: rgba(169,130,58,0.16);
  border-left: 2px solid rgba(169,130,58,0.45);
  font-family: var(--mono);
  font-size: 11px;
}

.feasi-row .amount-auto {
  color: var(--faint);
  font-family: var(--mono);
  font-size: 10px;
}

.template-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.template-legend span {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,0.5);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 9px;
}

.template-legend span:first-child {
  border-color: rgba(169,130,58,0.28);
  color: var(--gold);
  background: rgba(169,130,58,0.12);
}

.input-checklist {
  display: grid;
  gap: 10px;
  margin-top: 12px;
}

.check-row {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 10px;
  align-items: start;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.48);
}

.check-row i {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: rgba(69,111,143,0.13);
  color: var(--blue);
  font-style: normal;
  font-family: var(--mono);
  font-size: 11px;
}

.check-row b {
  display: block;
  font-size: 15px;
  margin-bottom: 3px;
}

.check-row span {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.32;
}

.folder-tree {
  margin-top: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.66);
  padding: 16px 18px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.48;
  color: var(--ink);
  overflow: hidden;
}

.folder-tree .muted {
  color: var(--faint);
}

.folder-tree .folder {
  color: var(--blue);
}

.folder-tree .project {
  color: var(--gold);
}

.structure-note {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.structure-note div {
  border: 1px solid var(--line);
  border-radius: 7px;
  background: rgba(255,255,255,0.48);
  padding: 10px;
  color: var(--muted);
  font-size: 12.5px;
  line-height: 1.3;
}

.structure-note b {
  display: block;
  color: var(--ink);
  font-size: 13px;
  margin-bottom: 4px;
}

.fabric-layout {
  display: grid;
  grid-template-columns: 0.78fr 1.2fr 0.92fr;
  gap: 18px;
  height: 100%;
  align-items: stretch;
}

.fabric-entry,
.fabric-benefits {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.source-file {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.62);
  padding: 18px;
  margin-top: 14px;
}

.source-file h3,
.fabric-benefits h3 {
  margin: 0 0 10px;
  font-family: var(--serif);
  font-weight: 400;
  font-size: 28px;
  line-height: 1.05;
}

.source-file p,
.fabric-benefits p {
  margin: 0;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.4;
}

.fabric-core {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 10px;
}

.fabric-core-title {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  color: var(--blue);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.fabric-layer {
  border: 1px solid rgba(69,111,143,0.22);
  border-radius: 8px;
  background: rgba(69,111,143,0.08);
  padding: 15px 16px;
  display: grid;
  align-content: center;
}

.fabric-layer b {
  display: block;
  font-family: var(--serif);
  font-weight: 400;
  font-size: 24px;
  margin-bottom: 6px;
}

.fabric-layer span {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.35;
}

.fabric-tables {
  display: grid;
  gap: 8px;
  align-content: start;
}

.fabric-table {
  border: 1px solid rgba(69,111,143,0.18);
  border-radius: 7px;
  background: rgba(255,255,255,0.56);
  overflow: hidden;
}

.fabric-table b {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 7px 10px;
  background: rgba(69,111,143,0.09);
  color: var(--blue);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.fabric-table b span {
  color: var(--faint);
  font-weight: 400;
}

.fabric-table p {
  margin: 0;
  padding: 7px 10px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.25;
}

.fabric-flow-mini {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.fabric-flow-mini div {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.5);
  padding: 11px 12px;
  color: var(--muted);
  font-size: 13px;
}

.fabric-flow-mini b {
  display: block;
  color: var(--ink);
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  margin-bottom: 3px;
}

.fabric-pain-list,
.fabric-value-list {
  display: grid;
  gap: 11px;
  margin-top: 16px;
}

.fabric-pain-list div,
.fabric-value-list div {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,0.48);
  padding: 12px 13px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.34;
}

.fabric-pain-list div {
  border-left: 3px solid var(--red);
}

.fabric-value-list div {
  border-left: 3px solid var(--gold);
  color: var(--ink);
  background: var(--gold-soft);
}

.foundation-objects {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 11px;
  align-content: center;
}

.business-object {
  min-height: 138px;
  border: 1px solid rgba(69,111,143,0.22);
  border-radius: 8px;
  background: rgba(255,255,255,0.58);
  padding: 15px;
}

.object-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: rgba(69,111,143,0.12);
  color: var(--blue);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.business-object b {
  display: block;
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  line-height: 1.05;
  margin-bottom: 8px;
}

.business-object span {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.32;
}

.benefit-list {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.benefit-list div {
  border-left: 3px solid var(--gold);
  padding: 10px 12px;
  background: var(--gold-soft);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.35;
}

.snapshot-grid {
  display: grid;
  grid-template-columns: 1.25fr 0.8fr;
  gap: 22px;
  height: 100%;
}

.timeline {
  padding: 24px 26px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.timeline-track {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  position: relative;
}

.timeline-track::before {
  content: "";
  position: absolute;
  left: 10%;
  right: 10%;
  top: 26px;
  height: 2px;
  background: var(--gold);
}

.month {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 12px;
  justify-items: center;
}

.month-dot {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  border: 1px solid var(--gold);
  background: var(--paper);
  font-family: var(--serif);
  color: var(--gold);
  font-size: 21px;
  box-shadow: 0 0 0 7px var(--paper);
}

.month-card {
  width: 100%;
  min-height: 150px;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.54);
}

.month-card b {
  display: block;
  font-family: var(--mono);
  color: var(--faint);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 9px;
}

.month-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  color: var(--muted);
  font-size: 14px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.compare-card {
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.compare-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}

.compare-row:last-child { border-bottom: none; }

.compare-label {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
}

.compare-value {
  font-family: var(--serif);
  font-size: 30px;
}

.map-layout {
  display: grid;
  grid-template-columns: 1.25fr 0.75fr;
  gap: 22px;
  height: 100%;
}

.map-card {
  padding: 22px;
}

.site-map {
  position: relative;
  height: 100%;
  min-height: 430px;
  border-radius: 10px;
  border: 1px solid rgba(109,143,99,0.28);
  background:
    linear-gradient(90deg, transparent 48%, rgba(69,111,143,0.20) 48%, rgba(69,111,143,0.20) 52%, transparent 52%),
    linear-gradient(180deg, rgba(109,143,99,0.18), rgba(109,143,99,0.08));
  overflow: hidden;
}

.site-map::before {
  content: "";
  position: absolute;
  left: 47.4%;
  top: 7%;
  bottom: 7%;
  width: 5.2%;
  border-radius: 999px;
  background: repeating-linear-gradient(180deg, #879096 0 20px, #6f777d 20px 22px);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.28);
}

.site-map::after {
  content: "";
  position: absolute;
  left: 49.35%;
  top: 8%;
  bottom: 8%;
  width: 1.1%;
  border-radius: 999px;
  background: #5aa9b9;
  opacity: 0.85;
}

.phase-zone {
  position: absolute;
  border-radius: 7px;
  border: 1px solid rgba(32,32,29,0.12);
  background: rgba(255,255,255,0.52);
  padding: 9px;
}

.zone-active {
  border: 2px solid var(--gold);
  background: rgba(169,130,58,0.14);
  box-shadow: 0 14px 34px rgba(169,130,58,0.16);
}

.phase-label {
  position: absolute;
  top: -22px;
  left: 0;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--gold);
  text-transform: uppercase;
}

.lot-grid {
  height: 100%;
  display: grid;
  gap: 4px;
}

.lot-grid.cols-8 { grid-template-columns: repeat(8, 1fr); }
.lot-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
.lot-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

.lot {
  border-radius: 2px;
  background: rgba(109,143,99,0.46);
  min-height: 12px;
}

.lot.gold { background: rgba(169,130,58,0.48); }
.lot.blue { background: rgba(69,111,143,0.42); }
.lot.orange { background: rgba(196,127,69,0.42); }

.map-side {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 16px;
}

.phase-selector {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.phase-chip {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 11px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  background: rgba(255,255,255,0.45);
}

.phase-chip.active {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-soft);
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.kpi-card {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: rgba(255,255,255,0.55);
}

.kpi-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 8px;
}

.kpi-value {
  font-family: var(--serif);
  font-size: 30px;
  line-height: 1;
}

.kpi-note {
  color: var(--muted);
  font-size: 13px;
  margin-top: 6px;

<script>
const deck = document.getElementById('deck');
const nav = document.getElementById('nav');
const TOTAL_SLIDES = 13;
const FLOW_STEPS = [
  ['01', 'Excel Input', 'control'],
  ['02', 'Fabric Foundation', 'control'],
  ['03', 'Monthly Snapshot', 'control'],
  ['04', 'Power BI Dashboard', 'visibility'],
  ['05', 'Simulation', 'decision'],
  ['06', 'Copilot Q&A', 'decision'],
];

function kpiCard(label, value, note = '') {
  return `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${note ? `<div class="kpi-note">${note}</div>` : ''}</div>`;
}

function footer(index) {
  return `
    <div class="footer">
      <div>Feasibility Management Control Platform · NCT Smart Industrial Park</div>
      <div>${String(index).padStart(2, '0')} / ${TOTAL_SLIDES}</div>
    </div>`;
}

function chrome(kicker, index) {
  return `
    <div class="chrome">
      <div>${kicker}</div>
      <div><b>${String(index).padStart(2, '0')}</b> / ${TOTAL_SLIDES}</div>
    </div>`;
}

function slide(index, kicker, title, subtitle, content) {
  return `
    <section class="slide${index === 1 ? ' active' : ''}">
      ${chrome(kicker, index)}
      <div class="slide-head">
        <h2>${title}</h2>
        ${subtitle ? `<p class="subtitle">${subtitle}</p>` : ''}
      </div>
      <div class="content">${content}</div>
      ${footer(index)}
    </section>`;
}

function flowBreadcrumb(activeSteps) {
  const active = new Set(activeSteps.map(n => String(n).padStart(2, '0')));
  return `
    <div class="mini-flow">
      <div class="mini-flow-label">Flow position</div>
      <div class="mini-flow-steps">
        ${FLOW_STEPS.map(([n, label, type]) => `
          <div class="mini-step ${active.has(n) ? `active ${type}` : ''}"><b>${n}</b><span>${label}</span></div>`).join('')}
      </div>
    </div>`;
}

function heroSlide() {
  return `
    <section class="slide active">
      ${chrome('Executive message', 1)}
      <div class="hero-grid">
        <div>
          <h1>From Excel Feasibility to <em>Project Decision Intelligence</em></h1>
          <div class="hero-statement">
            Transform feasibility from scattered Excel files into a controlled, comparable and decision-ready management platform.
          </div>
        </div>
        <div class="platform-hero panel">
          <div class="platform-row">
            <div>
              <div class="file-stack">
                <div class="file"><div class="file-title">Phase Feasi</div><div class="file-meta">APR · v3</div></div>
                <div class="file"><div class="file-title">Cost Update</div><div class="file-meta">QS · MAY</div></div>
                <div class="file"><div class="file-title">Sales View</div><div class="file-meta">Q2 REVIEW</div></div>
              </div>
            </div>
            <div class="arrow">→</div>
            <div class="decision-card">
              <div class="label">Management view</div>
              <div class="value">Trust the number.<br><em>See the movement.</em></div>
            </div>
          </div>
          <div class="three-proof">
            <div class="proof-card quiet-panel"><strong>Control</strong><span>One governed feasibility view across projects and phases.</span></div>
            <div class="proof-card quiet-panel"><strong>Traceability</strong><span>Original and monthly assumptions remain comparable.</span></div>
            <div class="proof-card quiet-panel"><strong>Decisions</strong><span>Simulation and Q&A sit on trusted data, not manual packs.</span></div>
          </div>
        </div>
      </div>
      ${footer(1)}
    </section>`;
}

function mergedRiskSlide() {
  const reality = [
    ['01', 'Many Excel versions', 'Different teams update QS, sales, finance and project files separately, so the &ldquo;latest&rdquo; number is not always obvious.'],
    ['02', 'Monthly assumptions overwritten', 'When a new month is updated, previous assumptions can be hidden in old files or become hard to audit.'],
    ['03', 'Manual quarterly comparison', 'Quarterly movement depends on someone finding, opening and consolidating previous workbooks.'],
    ['04', 'Actual vs target prepared slowly', 'Actual cost, budget and target comparison is prepared outside the feasibility file, so variance appears late.'],
    ['05', 'No fast phase root cause', 'When margin moves, the cause is not immediately linked to a phase, cost item or assumption.'],
  ];
  const scale = [
    ['01', 'More projects × more phases = more &ldquo;latest&rdquo; files to reconcile.'],
    ['02', 'More monthly cycles = more assumption history to protect.'],
    ['03', 'More quarters = more manual comparison work.'],
    ['04', 'More actuals, budgets and awarded updates = more variance checks to prepare.'],
    ['05', 'More phases and cost items = harder root-cause tracing.'],
  ];
  return `
    <div class="excel-reality">
      <div class="reality-card panel">
        <div class="zone-title">Current Excel Reality · 5 issues</div>
        <div class="reality-list">
          ${reality.map(([n, issue, pain]) => `
            <div class="risk-row"><div class="risk-num">${n}</div><div class="risk-copy"><b>${issue}</b><span>${pain}</span></div></div>`).join('')}
        </div>
      </div>
      <div class="scale-card panel">
        <div class="zone-title">Portfolio growth amplifies the issues</div>
        <h3>What is manageable in one project becomes difficult across many projects and phases.</h3>
        <div class="growth-equation"><span>Projects</span><span>Phases</span><span>Months</span><span>Versions</span></div>
        <div class="scale-flow">
          ${scale.map(([n, copy]) => `<div class="scale-step"><b>${n}</b><span>${copy}</span></div>`).join('')}
        </div>
        <div class="reality-takeaway">The issue is not Excel calculation. The issue is Excel control at portfolio scale.</div>
      </div>
    </div>`;
}

function messyWorkflow() {
  const files = [
    ['QS', 'PH1 cost May v2'], ['Sales', 'Take-up Q2'], ['Finance', 'Actuals Apr'], ['Project', 'WIP update'],
    ['QS', 'Awarded v3'], ['Sales', 'Pricing latest'], ['Finance', 'Target budget'], ['PM', 'Timeline note'],

  return `
    <div class="messy-workflow">
      <div class="messy-zone panel">
        <div class="zone-title">Different teams · Different files</div>
        <div class="team-files">${files.map(([team, version]) => `
          <div class="mini-xls"><div class="team">${team}</div><div class="version">${version}</div></div>`).join('')}

      <div class="arrow">→</div>
      <div class="messy-zone panel manual-stack">

          <div class="management-question"><span>Management review question</span><b>Which phase caused the margin movement?</b></div>

        <div class="control-line">The issue is not calculation. The issue is control, traceability and speed.</div>
      </div>
    </div>`;
}

function riskTable() {
  const issues = [
    ['01', 'Many Excel versions', 'Different teams may refer to different &ldquo;latest&rdquo; files.'],
    ['02', 'Monthly assumptions overwritten', 'Previous assumptions are difficult to compare or audit.'],
    ['03', 'Manual quarterly comparison', 'Trend review depends on someone consolidating old files.'],
    ['04', 'Actual vs target prepared slowly', 'Variance is visible only after manual preparation.'],

  return `

      </div>
      <div class="risk-col" style="display:grid;align-content:center;gap:18px">
        <div class="risk-head">Management review risk</div>
        <div class="movement-card quiet-panel">
          <div class="big">22.4% → 18.9%</div>
          <p>When margin moves from <strong>22.4% to 18.9%</strong>, management should not need to wait for a manual investigation to know whether the cause is price, cost, phase mix, awarded work, or timing.</p>
          <div class="cause-tags"><span>Price</span><span>Cost</span><span>Phase mix</span><span>Awarded work</span><span>Timing</span></div>
        </div>
      </div>
    </div>`;
}

function beforeAfter() {
  const before = [
    'Multiple versions make it hard to trust the latest number',
    'Historical assumptions are difficult to preserve and compare',
    'Quarterly movement depends on manual consolidation',
    'Management sees results before the root cause is clear',
  ];
  const future = [
    'One trusted view of current and historical feasibility',
    'Monthly snapshots make change visible over time',
    'Phase drill-down helps explain movement faster',
    'Simulation supports better decisions before commitment',
  ];
  const values = ['Better control', 'Faster comparison', 'Clearer root cause', 'Earlier risk visibility'];

  slide(6, 'Phase 1 · Fabric foundation', 'Fabric turns scattered feasibility files into a trusted data foundation', 'Once input rules are clear, feasibility data can be structured for reporting, comparison, snapshots and simulation.', fabricFoundationSlide()),
  slide(7, 'Phase 1 · Snapshot', 'Monthly snapshots preserve feasibility history instead of overwriting it', 'After Excel input and Fabric foundation are in place, each monthly update becomes a saved business record.', snapshotTimeline()),
  slide(8, 'Phase 2 · Drill-down', 'Power BI turns the master plan into a phase-level management view', 'Select a phase → see GDV, development cost, margin, cost per SF, budget vs awarded, actual vs target and root cause.', masterPlanDrilldown()),
  slide(9, 'Management dashboard', 'The dashboard helps management identify where performance is changing', 'Feasibility becomes a management review screen, not a static file.', dashboardMockup()),
  slide(10, 'Phase 3 · Simulation', 'Phase 3 turns feasibility from reporting into decision support', 'Management can test price, cost, take-up, financing and delay assumptions before committing.', simulationPanel()),
  slide(11, 'Future Q&A layer', 'Copilot becomes useful after the data foundation is clean', 'AI is not the first value. Trusted feasibility data is the first value; Copilot becomes a practical question layer on top.', copilotMockup()),
  slide(12, 'Business value', 'The business value is better control, faster visibility, and earlier risk detection', 'The platform improves how management reviews feasibility across projects and phases.', valueScorecard()),
  slide(13, 'Pilot recommendation', 'Recommended next step: start with a focused pilot', 'Small scope, real data, fast proof, management review.', pilotRoadmap()),
];

deck.innerHTML = slides.join('');

const slideEls = [...document.querySelectorAll('.slide')];
let current = 0;

slideEls.forEach((_, i) => {
  const button = document.createElement('button');
  button.setAttribute('aria-label', `Go to slide ${i + 1}`);
  button.className = i === 0 ? 'active' : '';
  button.addEventListener('click', () => goTo(i));
  nav.appendChild(button);
});

function goTo(index) {
  if (index < 0 || index >= slideEls.length) return;
  slideEls[current].classList.remove('active');
  nav.children[current].classList.remove('active');
  current = index;
  slideEls[current].classList.add('active');
  nav.children[current].classList.add('active');
}

document.addEventListener('keydown', (event) => {
  if (event.key === 'ArrowRight' || event.key === ' ' || event.key === 'PageDown') {
    event.preventDefault();
    goTo(current + 1);
  }
  if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
    event.preventDefault();
    goTo(current - 1);
  }
  if (event.key === 'Home') goTo(0);
  if (event.key === 'End') goTo(slideEls.length - 1);
});
</script>
